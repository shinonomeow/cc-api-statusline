name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create tags and releases
      id-token: write  # Required for npm provenance and OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Fetch current and previous commit

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Get previous version
        id: previous_version
        run: |
          # Get package.json from previous commit
          PREV_VERSION=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8')).version")
          echo "version=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "Previous version: $PREV_VERSION"

      - name: Check if version changed
        id: version_changed
        run: |
          if [ "${{ steps.current_version.outputs.version }}" != "${{ steps.previous_version.outputs.version }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed from ${{ steps.previous_version.outputs.version }} to ${{ steps.current_version.outputs.version }}"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged"
          fi

      - name: Create tag
        if: steps.version_changed.outputs.changed == 'true'
        run: |
          VERSION="v${{ steps.current_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "Created and pushed tag: $VERSION"

      - name: Extract changelog
        if: steps.version_changed.outputs.changed == 'true'
        id: changelog
        run: |
          # Get commit message from the version bump commit
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version_changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.current_version.outputs.version }}"
          CHANGELOG="${{ steps.changelog.outputs.changelog }}"

          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "## Changes

          $CHANGELOG

          ## Installation

          \`\`\`bash
          npm install -g cc-api-statusline@${{ steps.current_version.outputs.version }}
          \`\`\`

          or

          \`\`\`bash
          bunx -y cc-api-statusline@${{ steps.current_version.outputs.version }}
          \`\`\`"

      - name: Setup Bun
        if: steps.version_changed.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        if: steps.version_changed.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.version_changed.outputs.changed == 'true'
        run: bun install

      - name: Run tests and linting
        if: steps.version_changed.outputs.changed == 'true'
        run: bun run check

      - name: Upgrade npm to latest
        if: steps.version_changed.outputs.changed == 'true'
        run: npm install -g npm@latest

      - name: Verify npm version
        if: steps.version_changed.outputs.changed == 'true'
        run: npm --version

      - name: Publish to npm with provenance
        if: steps.version_changed.outputs.changed == 'true'
        run: npm publish --provenance --access public
